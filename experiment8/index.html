<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 8: PHP Backend Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #eef2f3;
            color: #333;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        .showcase {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 50px;
        }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .card-header {
            background: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            color: #34495e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #27ae60;
        }

        .img-wrapper {
            padding: 15px;
            background: #fcfcfc;
        }

        img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .footer {
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 30px;
        }

        .btn-back {
            text-decoration: none;
            background: #3498db;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-back:hover {
            background: #2980b9;
        }

        @media (max-width: 850px) {
            .showcase {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Experiment 8</h1>
            <p class="subtitle">Demonstrating PHP Server Integration with XAMPP</p>
        </header>

        <div class="showcase">
            <!-- XAMPP Card -->
            <div class="card">
                <div class="card-header">
                    <span class="dot"></span>
                    XAMPP Control Panel
                </div>
                <div class="img-wrapper">
                    <img src="xampp.png" alt="XAMPP Status">
                </div>
            </div>

            <!-- Browser Card -->
            <div class="card">
                <div class="card-header">
                    <span class="dot"></span>
                    Execution Result
                </div>
                <div class="img-wrapper">
                    <img src="browser.png" alt="PHP Output">
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="../index.html" class="btn-back">← Back to Experiments</a>
        </div>
    </div>

</body>
</html>
